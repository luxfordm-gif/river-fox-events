<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Defaults — will be overwritten per route by scripts/postbuild.mjs at build time. -->
    <title>Luxury Event Styling Surrey | Children's Parties, Milestones &amp; Brand | River Fox Events</title>
    <meta name="description" content="Surrey event stylist for children's parties, milestone celebrations and corporate brand activations across Surrey and London. From £460, designed by Laura." />
    <meta name="author" content="River Fox Events" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="River Fox Events" />
    <meta property="og:title" content="Luxury Event Styling Surrey | River Fox Events" />
    <meta property="og:description" content="Surrey event stylist for children's parties, milestone celebrations and corporate brand activations across Surrey and London. From £460, designed by Laura." />
    <meta property="og:image" content="/social-share.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Luxury Event Styling Surrey | River Fox Events" />
    <meta name="twitter:description" content="Surrey event stylist for children's parties, milestone celebrations and corporate brand activations across Surrey and London. From £460, designed by Laura." />
    <meta name="twitter:image" content="/social-share.jpg" />

    <link rel="icon" href="/favicon.ico" />
  </head>

  <body>
    <!--
      Static form for Netlify's build-time form detection. The real form is
      rendered by React (src/components/rfx/Enquire.tsx) and POSTs to "/" with
      these same field names. Netlify needs to see this in the static HTML to
      register the form and route submissions to Forms → Notifications.
    -->
    <form name="enquire" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="date" name="date" />
      <input type="text" name="type" />
      <input type="text" name="venue" />
      <input type="text" name="budget" />
      <textarea name="vision"></textarea>
      <input type="text" name="page" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
